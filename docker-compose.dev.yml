services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ferie
      POSTGRES_USER: ferie
      POSTGRES_PASSWORD: ferie
    ports:
      - "5433:5432"
    volumes:
      - ferie_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferie"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  ferie_dev_pgdata:
